# Runs the integration tests with a Docker-in-Docker daemon available.
#
# Testcontainers needs Docker to start the containers the tests require
# (TeamCity server, Caddy, Octopus Deploy, MSSQL, TeamCity agent).
# The `docker` service provides a DinD daemon; `integration-tests` waits
# for it to be healthy before running Maven.
#
# Maven repository: -Dmaven.repo.local points at `.m2-cache/` inside the
# checkout (mounted into the container at /workspace/.m2-cache). On TeamCity,
# the build configuration enables the Build Cache feature against that path
# so dependencies survive across throwaway agents; locally, the directory
# just persists across docker-compose runs on the same machine.
#
# Run from the repo root:
#   REVISION=1.0-SNAPSHOT docker compose --progress quiet -f integration-tests/docker-compose.yml \
#     up --quiet-pull --abort-on-container-exit --exit-code-from integration-tests

services:
  docker:
    image: docker:27-dind
    privileged: true
    command: ["--tls=false", "--log-level=error", "--ipv6=false"]
    environment:
      DOCKER_TLS_CERTDIR: ""
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 20s

  integration-tests:
    image: maven:3.9-eclipse-temurin-21
    depends_on:
      docker:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://docker:2375
      # Testcontainers maps container ports on the DinD host, not localhost
      TESTCONTAINERS_HOST_OVERRIDE: docker
      REVISION: ${REVISION:-1.0-SNAPSHOT}
    volumes:
      - ../:/workspace
    working_dir: /workspace
    command: mvn verify -pl integration-tests -ntp -Drevision=${REVISION:-1.0-SNAPSHOT} -Dmaven.repo.local=/workspace/.m2-cache
